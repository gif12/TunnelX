name: build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore AppTunnel.sln
      - name: Build
        run: dotnet build AppTunnel.sln -c Release --no-restore
